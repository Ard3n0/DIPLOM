<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Math NER PRO</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 1000px; margin: 30px auto; background: #fdfdfd; }
        .box { background: white; padding: 30px; border-radius: 12px; border: 1px solid #eee; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        textarea { width: 100%; height: 150px; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        .controls { margin-top: 10px; display: flex; gap: 15px; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        button { background: #1a73e8; color: white; border: none; padding: 10px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #output { margin-top: 30px; display: none; }
        .text-preview { background: #fff; padding: 20px; border: 1px solid #eee; border-radius: 10px; line-height: 1.8; font-size: 17px; }
        .highlight { background: #fff3cd; border-bottom: 2px solid #ffc107; }
        .category-block { margin-top: 25px; }
        .category-title { font-weight: bold; text-transform: uppercase; padding-bottom: 5px; margin-bottom: 12px; font-size: 1.1em; }
        .badge-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .badge { padding: 6px 14px; border-radius: 15px; font-size: 14px; font-weight: bold; }
        

        .color-TERM { color: #0f9d58; border-bottom: 2px solid #0f9d58; }
        .bg-TERM { background: #e6f4ea; color: #0f9d58; border: 1px solid #0f9d58; }
        
        .color-NAME { color: #1a73e8; border-bottom: 2px solid #1a73e8; }
        .bg-NAME { background: #e8f0fe; color: #1a73e8; border: 1px solid #1a73e8; }
        
        .color-FORMULA { color: #9c27b0; border-bottom: 2px solid #9c27b0; }
        .bg-FORMULA { background: #f3e5f5; color: #9c27b0; border: 1px solid #9c27b0; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Математический NER Анализатор</h2>
        <form id="f">
            <textarea id="t" placeholder="Вставьте математический текст с теоремами, терминами и формулами..."></textarea>
            <div class="controls">
                <input type="file" id="i" accept=".txt">
                <button type="submit">Анализировать</button>
            </div>
        </form>
        <div id="output">
            <div class="text-preview" id="text-out"></div>
            <div id="cats"></div>
        </div>
    </div>

    <script>
        document.getElementById('f').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData();
            const file = document.getElementById('i').files[0];
            if (file) formData.append("file", file);
            else formData.append("text", document.getElementById('t').value);

            const r = await fetch('/extract', { method: 'POST', body: formData });
            const d = await r.json();

            let txt = d.text;
            [...d.entities].sort((a,b) => b.start - a.start).forEach(en => {
                txt = txt.slice(0, en.start) + `<span class="highlight">${txt.slice(en.start, en.end)}</span>` + txt.slice(en.end);
            });
            document.getElementById('text-out').innerHTML = txt;

            const groups = {};
            const labelsMap = { 
                "TERM": "МАТЕМАТИЧЕСКИЙ ТЕРМИН", 
                "NAME": "УЧЕНЫЙ / АВТОР", 
                "FORMULA": "ФОРМУЛА / ВЫРАЖЕНИЕ" 
            };

            d.entities.forEach(en => {
                if (en.word.length < 2) return; // Убираем одиночные буквы, если это не формула
                const rawType = en.type.replace(/[BI]-/, "");
                const prettyType = labelsMap[rawType] || rawType;
                
                if (!groups[rawType]) groups[rawType] = { name: prettyType, words: [] };
                if (!groups[rawType].words.includes(en.word)) groups[rawType].words.push(en.word);
            });

            const cont = document.getElementById('cats');
            cont.innerHTML = '';
            

            const order = ["NAME", "TERM", "FORMULA"];
            
            order.forEach(typeKey => {
                if (groups[typeKey]) {
                    const data = groups[typeKey];
                    cont.innerHTML += `
                        <div class="category-block">
                            <div class="category-title color-${typeKey}">${data.name}</div>
                            <div class="badge-list">
                                ${data.words.map(w => `<span class="badge bg-${typeKey}">${w}</span>`).join('')}
                            </div>
                        </div>`;
                }
            });
            document.getElementById('output').style.display = 'block';
        };
    </script>
</body>
</html>
