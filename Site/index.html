<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NER Математика PRO</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 1000px; margin: 30px auto; background: #fdfdfd; }
        .box { background: white; padding: 30px; border-radius: 12px; border: 1px solid #eee; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        textarea { width: 100%; height: 150px; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; }
        .controls { margin-top: 10px; display: flex; gap: 15px; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        button { background: #1a73e8; color: white; border: none; padding: 10px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #output { margin-top: 30px; display: none; }
        .text-preview { background: #fff; padding: 20px; border: 1px solid #eee; border-radius: 10px; line-height: 1.8; font-size: 17px; }
        .highlight { background: #fff3cd; border-bottom: 2px solid #ffc107; }
        .category-block { margin-top: 20px; }
        .category-title { font-weight: bold; text-transform: uppercase; padding-bottom: 5px; margin-bottom: 10px; }
        .badge-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .badge { padding: 5px 12px; border-radius: 15px; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Разметка</h2>
        <form id="f">
            <textarea id="t" placeholder="Введите текст..."></textarea>
            <div class="controls">
                <input type="file" id="i" accept=".txt">
                <button type="submit">Анализировать</button>
            </div>
        </form>
        <div id="output">
            <div class="text-preview" id="text-out"></div>
            <div id="cats"></div>
        </div>
    </div>

    <script>
        document.getElementById('f').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData();
            const file = document.getElementById('i').files[0];
            if (file) formData.append("file", file);
            else formData.append("text", document.getElementById('t').value);

            const r = await fetch('/extract', { method: 'POST', body: formData });
            const d = await r.json();

            let txt = d.text;
            [...d.entities].sort((a,b) => b.start - a.start).forEach(en => {
                txt = txt.slice(0, en.start) + `<span class="highlight">${txt.slice(en.start, en.end)}</span>` + txt.slice(en.end);
            });
            document.getElementById('text-out').innerHTML = txt;

            const groups = {};
            const labelsMap = { "NAME": "ОСНОВНОЕ ПОНЯТИЕ", "TERM": "МАТЕМАТИЧЕСКИЙ ТЕРМИН" };

            d.entities.forEach(en => {
                if (en.word.length < 3) return;
                const type = labelsMap[en.type.replace(/[BI]-/, "")] || en.type;
                if (!groups[type]) groups[type] = [];
                if (!groups[type].includes(en.word)) groups[type].push(en.word);
            });

            const cont = document.getElementById('cats');
            cont.innerHTML = '';
            Object.keys(groups).forEach(type => {
                cont.innerHTML += `
                    <div class="category-block">
                        <div class="category-title" style="color:#1a73e8; border-bottom:2px solid #1a73e8">${type}</div>
                        <div class="badge-list">${groups[type].map(w => `<span class="badge" style="background:#e8f0fe; color:#1a73e8; border:1px solid #1a73e8">${w}</span>`).join('')}</div>
                    </div>`;
            });
            document.getElementById('output').style.display = 'block';
        };
    </script>
</body>
</html>
